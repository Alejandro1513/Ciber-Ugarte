<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciber Ugarte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        oscuro: '#0a0a0f',
                        azul: '#0099ff',
                        verde: '#00ff88',
                        gris: '#1a1a24',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .text-shadow {
                text-shadow: 0 0 10px rgba(0, 153, 255, 0.5);
            }
            .neon-border {
                box-shadow: 0 0 10px rgba(0, 255, 136, 0.3), inset 0 0 10px rgba(0, 255, 136, 0.2);
            }
        }
    </style>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0f 0%, #12121f 100%);
            font-family: 'Inter', sans-serif;
        }

        /* 👇 ESTA ES LA PARTE QUE CAMBIAMOS DEL BOTÓN 👇 */
        .menu-toggle {
            position: fixed;
            top: 20px;  /* 👈 LO PONE ARRIBA */
            right: 20px;
            background: #00ff88; /* 👈 COLOR VERDE */
            color: #000;
            width: 50px;
            height: 50px;
            border-radius: 50%; /* 👈 LO HACE REDONDO */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px #00ff88;
        }
        .menu-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px #00ff88;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100vh;
            background: rgba(26, 26, 36, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid #00ff8833;
            z-index: 9999;
            transition: left 0.4s ease;
            padding: 2rem 1rem;
        }
        .sidebar.active {
            left: 0;
        }
        .sidebar a {
            display: block;
            color: #ccc;
            padding: 1rem;
            margin: 0.3rem 0;
            border-radius: 8px;
            transition: all 0.3s;
            text-decoration: none;
        }
        .sidebar a:hover {
            background: #00ff8822;
            color: #00ff88;
            padding-left: 1.2rem;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            display: none;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body class="text-white">

    <!-- Menú Lateral -->
    <div class="overlay" id="overlay" onclick="cerrarMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="text-center mb-8">
            <h3 class="text-verde text-xl font-bold">CIBER UGARTE</h3>
        </div>
        <a href="#"><i class="fa fa-home mr-2"></i> Inicio</a>
        <a href="#"><i class="fa fa-cogs mr-2"></i> Servicios</a>
        <a href="#"><i class="fa fa-file-text mr-2"></i> Trámites</a>
        <a href="#"><i class="fa fa-graduation-cap mr-2"></i> Cursos</a>
        <a href="#"><i class="fa fa-laptop mr-2"></i> Ingeniería</a>
        <a href="#"><i class="fa fa-envelope mr-2"></i> Contacto</a>
    </div>

    <!-- Botón de Menú (ARRIBA, VERDE, REDONDO) -->
    <div class="menu-toggle" id="menuToggle" onclick="abrirCerrarMenu()">
        <i class="fa fa-bars"></i>
    </div>

    <!-- Contenido Principal -->
    <div class="container mx-auto px-4 py-12">
        <!-- Encabezado -->
        <div class="text-center mb-16">
            <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-bold text-verde text-shadow mb-4">CIBER UGARTE</h1>
            <p class="text-gray-400 text-lg">Sistemas // Logística // Dev</p>
            <div class="mt-6 space-y-2 text-sm text-gray-300">
                <p><i class="fa fa-phone text-azul mr-2"></i> +52 55 6758 3425</p>
                <p><i class="fa fa-envelope text-azul mr-2"></i> contacto@ciberugarte.com</p>
            </div>
        </div>

        <!-- Servicios -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-5xl mx-auto">
            
            <!-- Tarjeta Trámites -->
            <div class="bg-gris/70 rounded-xl p-6 border border-verde/20 neon-border hover:scale-105 transition-transform">
                <div class="flex items-center mb-4">
                    <i class="fa fa-folder-open text-verde text-3xl mr-3"></i>
                    <h3 class="text-2xl font-bold">TRÁMITES</h3>
                </div>
                <p class="text-gray-400 mb-4">CURP E IMSS</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-semibold">$3.50</span>
                    <button class="bg-verde/20 hover:bg-verde/40 text-verde px-4 py-2 rounded transition">SOLICITAR</button>
                </div>
            </div>

            <!-- Tarjeta Cursos -->
            <div class="bg-gris/70 rounded-xl p-6 border border-verde/20 neon-border hover:scale-105 transition-transform">
                <div class="flex items-center mb-4">
                    <i class="fa fa-book text-verde text-3xl mr-3"></i>
                    <h3 class="text-2xl font-bold">CURSOS</h3>
                </div>
                <p class="text-gray-400 mb-4">EXCEL Y OFFICE</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-semibold">$50.00</span>
                    <button class="bg-verde/20 hover:bg-verde/40 text-verde px-4 py-2 rounded transition">SOLICITAR</button>
                </div>
            </div>

            <!-- Tarjeta Ingeniería -->
            <div class="bg-gris/70 rounded-xl p-6 border border-verde/20 neon-border hover:scale-105 transition-transform">
                <div class="flex items-center mb-4">
                    <i class="fa fa-laptop text-verde text-3xl mr-3"></i>
                    <h3 class="text-2xl font-bold">INGENIERÍA</h3>
                </div>
                <p class="text-gray-400 mb-4">Proyectos y desarrollo</p>
                <div class="flex justify-between items-center">
                    <span class="text-2xl font-semibold">A CONVENIR</span>
                    <button class="bg-verde/20 hover:bg-verde/40 text-verde px-4 py-2 rounded transition">SOLICITAR</button>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts del Menú -->
    <script>
        function abrirCerrarMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }
        function cerrarMenu() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }
    </script>

</body>
</html>
